# Nixpacks configuration for zephix-frontend
# Node version: Use Node 22.x to meet Vite requirements.
# Vite requires Node 20.19+ or 22.12+.

[phases.setup]
# Use Node 22.x to satisfy Vite's runtime floor (>=22.12) on Railway.
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm run start"
