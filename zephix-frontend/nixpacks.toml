# Nixpacks configuration for zephix-frontend
#
# Vite 7+ requires Node 20.19+ or 22.12+ at runtime (`vite preview`).
# Railway's pinned nixpkgs still ships `nodejs_20` as 20.18.x, and Nixpacks
# only honors *major* versions from NIXPACKS_NODE_VERSION / .nvmrc — so a
# `.nvmrc` of `20.19.0` is treated as major `20` and keeps pulling 20.18.x.
# Pin major 22 so the Nix attr and provider agree on a supported runtime.

[variables]
NIXPACKS_NODE_VERSION = "22"

[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm run start"
