# Zephix Backend - Nixpacks Configuration
# Simplified configuration to avoid conflicts

[phases.setup]
nixPkgs = ["nodejs_20", "python3", "gcc", "gnumake", "pkg-config"]

[phases.install]
cmds = ["npm ci --legacy-peer-deps"]

[phases.build]
cmds = ["npm run build"]

[start]
# Run pending migrations before starting the app.
# migration:run is idempotent — safe to run on every boot.
# If the migration fails, the app will not start (desired behavior).
cmd = "npm run migration:run && npm run start:railway"
