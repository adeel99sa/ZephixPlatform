name: Staging Smoke Lane

on:
  pull_request:
    branches: [main, develop]
  push:
    branches:
      - 'smoke/staging/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  guardrails-staging-domain:
    name: guardrails-staging-domain
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Run staging domain guard
        run: bash scripts/smoke/run.sh guard

  staging-onboarding-smoke:
    name: staging-onboarding-smoke
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/heads/smoke/staging/')
    runs-on: ubuntu-latest
    env:
      EMAIL: ${{ secrets.STAGING_SMOKE_EMAIL }}
      PASS: ${{ secrets.STAGING_SMOKE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Validate smoke secrets exist
        run: |
          if [ -z "${EMAIL}" ] || [ -z "${PASS}" ]; then
            echo "::error::Missing STAGING_SMOKE_EMAIL or STAGING_SMOKE_PASSWORD secret"
            exit 1
          fi
      - name: Run staging onboarding smoke
        run: bash scripts/smoke/run.sh staging-onboarding
      - name: Upload onboarding proof bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: onboarding-latest-${{ github.run_id }}
          path: docs/architecture/proofs/staging/onboarding-latest
          retention-days: 14
