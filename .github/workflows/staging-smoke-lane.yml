name: Staging Smoke Lane

on:
  pull_request:
    branches: [main, develop]
  push:
    branches:
      - 'smoke/staging/**'
  workflow_dispatch:
    inputs:
      cleanup:
        description: 'Enable platform-core cleanup deletes (true|false)'
        required: false
        default: 'false'
      cleanup_project:
        description: 'Enable platform-core project delete cleanup (true|false)'
        required: false
        default: 'false'

permissions:
  contents: read

jobs:
  guardrails-staging-domain:
    name: guardrails-staging-domain
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Run staging domain guard
        run: bash scripts/smoke/run.sh guard

  api-contract-onboarding:
    name: api-contract-onboarding
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Run onboarding API contract check
        run: bash scripts/smoke/run.sh contract-onboarding

  api-contract-platform-core:
    name: api-contract-platform-core
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Run platform-core API contract check
        run: bash scripts/smoke/run.sh contract-platform-core

  api-contract-programs-portfolios:
    name: api-contract-programs-portfolios
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Run programs/portfolios API contract check
        run: bash scripts/smoke/run.sh contract-programs-portfolios

  api-contract-programs-portfolios-linkage:
    name: api-contract-programs-portfolios-linkage
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Run programs/portfolios linkage API contract check
        run: bash scripts/smoke/run.sh contract-programs-portfolios-linkage

  staging-onboarding-smoke:
    name: staging-onboarding-smoke
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/heads/smoke/staging/')
    runs-on: ubuntu-latest
    env:
      STAGING_SMOKE_KEY: ${{ secrets.STAGING_SMOKE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Validate smoke secrets exist
        run: |
          if [ -z "${STAGING_SMOKE_KEY}" ]; then
            echo "Missing STAGING_SMOKE_KEY"
            exit 1
          fi
      - name: Run staging onboarding smoke
        run: bash scripts/smoke/run.sh staging-onboarding
      - name: Upload onboarding proof bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: onboarding-latest-${{ github.run_id }}
          path: docs/architecture/proofs/staging/onboarding-latest
          retention-days: 14

  staging-platform-core-smoke:
    name: staging-platform-core-smoke
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      STAGING_SMOKE_KEY: ${{ secrets.STAGING_SMOKE_KEY }}
      SMOKE_CLEANUP: ${{ inputs.cleanup || 'false' }}
      SMOKE_CLEANUP_PROJECT: ${{ inputs.cleanup_project || 'false' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Validate smoke secrets exist
        run: |
          if [ -z "${STAGING_SMOKE_KEY}" ]; then
            echo "Missing STAGING_SMOKE_KEY"
            exit 1
          fi
      - name: Run staging platform core smoke
        run: bash scripts/smoke/run.sh platform-core
      - name: Upload platform core proof bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: platform-core-latest-${{ github.run_id }}
          path: docs/architecture/proofs/staging/platform-core-latest
          retention-days: 14

  api-preflight-platform-core:
    name: api-preflight-platform-core
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      STAGING_SMOKE_KEY: ${{ secrets.STAGING_SMOKE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Validate smoke secrets exist
        run: |
          if [ -z "${STAGING_SMOKE_KEY}" ]; then
            echo "Missing STAGING_SMOKE_KEY"
            exit 1
          fi
      - name: Run platform-core live preflight probe
        run: bash scripts/smoke/run.sh preflight-platform-core

  staging-programs-portfolios-smoke:
    name: staging-programs-portfolios-smoke
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      STAGING_SMOKE_KEY: ${{ secrets.STAGING_SMOKE_KEY }}
      SMOKE_CLEANUP: ${{ inputs.cleanup || 'false' }}
      SMOKE_CLEANUP_PROJECT: ${{ inputs.cleanup_project || 'false' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Validate smoke secrets exist
        run: |
          if [ -z "${STAGING_SMOKE_KEY}" ]; then
            echo "Missing STAGING_SMOKE_KEY"
            exit 1
          fi
      - name: Run staging programs/portfolios smoke
        run: bash scripts/smoke/run.sh programs-portfolios
      - name: Upload programs/portfolios proof bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: programs-portfolios-latest-${{ github.run_id }}
          path: docs/architecture/proofs/staging/programs-portfolios-latest
          retention-days: 14

  staging-programs-portfolios-linkage-smoke:
    name: staging-programs-portfolios-linkage-smoke
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      STAGING_SMOKE_KEY: ${{ secrets.STAGING_SMOKE_KEY }}
      SMOKE_CLEANUP: ${{ inputs.cleanup || 'false' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Validate smoke secrets exist
        run: |
          if [ -z "${STAGING_SMOKE_KEY}" ]; then
            echo "Missing STAGING_SMOKE_KEY"
            exit 1
          fi
      - name: Run staging programs/portfolios linkage smoke
        run: bash scripts/smoke/run.sh programs-portfolios-linkage
      - name: Upload programs/portfolios linkage proof bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: programs-portfolios-linkage-latest-${{ github.run_id }}
          path: docs/architecture/proofs/staging/programs-portfolios-linkage-latest
          retention-days: 14

  api-contract-org-invites:
    name: api-contract-org-invites
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Run org-invites API contract check
        run: bash scripts/smoke/run.sh contract-org-invites

  staging-org-invites-smoke:
    name: staging-org-invites-smoke
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      STAGING_SMOKE_KEY: ${{ secrets.STAGING_SMOKE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Validate smoke secrets exist
        run: |
          if [ -z "${STAGING_SMOKE_KEY}" ]; then
            echo "Missing STAGING_SMOKE_KEY"
            exit 1
          fi
      - name: Run staging org-invites smoke
        run: bash scripts/smoke/run.sh org-invites
      - name: Guard - no token leaks in proof artifacts
        run: bash scripts/guard/no-token-in-proof-artifacts.sh docs/architecture/proofs/staging/org-invites-latest
      - name: Upload org-invites proof bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: org-invites-latest-${{ github.run_id }}
          path: docs/architecture/proofs/staging/org-invites-latest
          retention-days: 14

  api-contract-customer-journey:
    name: api-contract-customer-journey
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Run customer journey API contract check
        run: bash scripts/smoke/run.sh contract-customer-journey

  api-guard-ui-acceptance:
    name: api-guard-ui-acceptance
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Run UI acceptance offline guard
        run: bash scripts/smoke/run.sh guard-ui-acceptance

  staging-customer-journey-smoke:
    name: staging-customer-journey-smoke
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      STAGING_SMOKE_KEY: ${{ secrets.STAGING_SMOKE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Validate smoke secrets exist
        run: |
          if [ -z "${STAGING_SMOKE_KEY}" ]; then
            echo "Missing STAGING_SMOKE_KEY"
            exit 1
          fi
      - name: Run staging customer journey smoke
        run: bash scripts/smoke/run.sh customer-journey
      - name: Guard - no token leaks in proof artifacts
        run: bash scripts/guard/no-token-in-proof-artifacts.sh docs/architecture/proofs/staging/customer-journey-latest
      - name: Upload customer journey proof bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: customer-journey-latest-${{ github.run_id }}
          path: docs/architecture/proofs/staging/customer-journey-latest
          retention-days: 14

  staging-ui-acceptance-smoke:
    name: staging-ui-acceptance-smoke
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      # STAGING_SMOKE_KEY is sensitive — injected from GitHub secret.
      # STAGING_FRONTEND_BASE is NOT a secret — it is read from docs/ai/environments/staging.env
      # (single source of truth for both local and CI). Populate that file, not this job.
      STAGING_SMOKE_KEY: ${{ secrets.STAGING_SMOKE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Install frontend dependencies
        run: cd zephix-frontend && npm install
      - name: Validate smoke secrets exist
        run: |
          if [ -z "${STAGING_SMOKE_KEY}" ]; then
            echo "Missing STAGING_SMOKE_KEY"
            exit 1
          fi
      - name: Run UI acceptance smoke lane
        run: bash scripts/smoke/run.sh ui-acceptance
      - name: Upload UI acceptance proof bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-acceptance-latest-${{ github.run_id }}
          path: docs/architecture/proofs/staging/ui-acceptance-latest
          retention-days: 14
